services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: salesbot
      POSTGRES_USER: salesbot
      POSTGRES_PASSWORD: salesbot
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
