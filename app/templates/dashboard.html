<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Bot — Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --bg2: #1a1a24;
    --bg3: #23232f;
    --blue: #4f8ef7;
    --blue-dim: rgba(79,142,247,0.12);
    --blue-glow: rgba(79,142,247,0.35);
    --green: #00e5a0;
    --green-dim: rgba(0,229,160,0.12);
    --red: #ff4d6d;
    --yellow: #ffd166;
    --text: #e8e8f0;
    --text-dim: #6b6b85;
    --text-mid: #a0a0b8;
    --border: rgba(255,255,255,0.06);
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,15,19,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 2rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--blue);
    border-radius: 8px;
    display: grid;
    place-items: center;
    font-size: 16px;
    box-shadow: 0 0 20px var(--blue-glow);
  }

  .logo-text {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .logo-text span { color: var(--blue); }

  .header-filters {
    display: flex;
    gap: 0.75rem;
    flex: 1;
    max-width: 600px;
  }

  .filter-input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.45rem 0.9rem;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.72rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .filter-input::placeholder { color: var(--text-dim); }
  .filter-input:focus { border-color: var(--blue); }

  .header-actions { margin-left: auto; display: flex; gap: 0.75rem; align-items: center; }

  .stat-pill {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.3rem 0.8rem;
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--text-mid);
  }

  .stat-pill b { color: var(--green); }

  .btn {
    padding: 0.5rem 1.1rem;
    border-radius: 8px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 0.8rem;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: var(--blue);
    color: #fff;
    box-shadow: 0 0 16px var(--blue-glow);
  }

  .btn-primary:hover {
    background: #6ba0ff;
    box-shadow: 0 0 24px var(--blue-glow);
    transform: translateY(-1px);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn-primary.loading { opacity: 0.7; pointer-events: none; }

  .btn-ghost {
    background: var(--bg2);
    color: var(--text-mid);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { border-color: var(--blue); color: var(--blue); }

  /* ── MAIN ── */
  main {
    position: relative;
    z-index: 1;
    padding: 2rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .section-title {
    font-size: 0.7rem;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-dim);
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── OFFERS GRID ── */
  .offers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }

  .offer-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  .offer-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--blue), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .offer-card:hover {
    border-color: rgba(79,142,247,0.3);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .offer-card:hover::before { opacity: 1; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .offer-name {
    font-size: 0.9rem;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
  }

  .payout-badge {
    flex-shrink: 0;
    background: var(--green-dim);
    border: 1px solid rgba(0,229,160,0.25);
    border-radius: 8px;
    padding: 0.3rem 0.6rem;
    font-family: var(--mono);
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--green);
    white-space: nowrap;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }

  .geo-tag {
    background: var(--blue-dim);
    border: 1px solid rgba(79,142,247,0.2);
    border-radius: 6px;
    padding: 0.2rem 0.5rem;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--blue);
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .type-badge {
    background: rgba(255,209,102,0.1);
    border: 1px solid rgba(255,209,102,0.2);
    border-radius: 6px;
    padding: 0.2rem 0.5rem;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--yellow);
    font-weight: 700;
  }

  .visibility-badge {
    background: rgba(255,77,109,0.1);
    border: 1px solid rgba(255,77,109,0.2);
    border-radius: 6px;
    padding: 0.2rem 0.5rem;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--red);
  }

  .categories {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1rem;
  }

  .cat-tag {
    background: var(--bg3);
    border-radius: 4px;
    padding: 0.15rem 0.45rem;
    font-size: 0.65rem;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  .card-actions {
    display: flex;
    gap: 0.5rem;
  }

  .btn-setup {
    flex: 1;
    padding: 0.55rem;
    background: var(--blue-dim);
    border: 1px solid rgba(79,142,247,0.25);
    border-radius: 8px;
    color: var(--blue);
    font-family: var(--sans);
    font-weight: 600;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-setup:hover {
    background: var(--blue);
    color: #fff;
    box-shadow: 0 0 16px var(--blue-glow);
  }

  /* ── EMPTY / LOADING ── */
  .state-box {
    grid-column: 1 / -1;
    padding: 4rem 2rem;
    text-align: center;
  }

  .state-box .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
  .state-box p { color: var(--text-dim); font-family: var(--mono); font-size: 0.8rem; }
  .state-box .hint { margin-top: 0.5rem; font-size: 0.7rem; color: var(--text-dim); opacity: 0.6; }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* ── PANEL OVERLAY ── */
  .panel-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .panel-overlay.open { opacity: 1; pointer-events: all; }

  /* ── SIDE PANEL ── */
  .side-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: min(680px, 100vw);
    background: var(--bg);
    border-left: 1px solid var(--border);
    z-index: 300;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .side-panel.open { transform: translateX(0); }

  .panel-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    flex-shrink: 0;
    background: var(--bg2);
  }

  .panel-header-info { flex: 1; }

  .panel-offer-name {
    font-size: 1.1rem;
    font-weight: 800;
    line-height: 1.3;
    margin-bottom: 0.5rem;
  }

  .panel-meta { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  .panel-payout {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--green);
    flex-shrink: 0;
    text-shadow: 0 0 20px rgba(0,229,160,0.4);
  }

  .panel-close {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 36px; height: 36px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 1.2rem;
    display: grid;
    place-items: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .panel-close:hover { border-color: var(--red); color: var(--red); }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .panel-section-title {
    font-family: var(--mono);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--blue);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .panel-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--blue-dim);
  }

  /* Traffic Sources */
  .traffic-cards { display: flex; flex-direction: column; gap: 0.75rem; }

  .traffic-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
  }

  .traffic-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--blue-dim);
    display: grid;
    place-items: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .traffic-info { flex: 1; }
  .traffic-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.25rem; }
  .traffic-why { font-size: 0.75rem; color: var(--text-mid); line-height: 1.5; }

  .traffic-cpc {
    flex-shrink: 0;
    text-align: right;
  }

  .cpc-value {
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 700;
    color: var(--yellow);
  }

  .cpc-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    display: block;
  }

  /* Audience */
  .audience-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.75rem;
  }

  .audience-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem;
  }

  .audience-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.4rem;
  }

  .audience-value {
    font-weight: 700;
    font-size: 0.9rem;
  }

  .chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.4rem; }

  .chip {
    background: var(--bg3);
    border-radius: 20px;
    padding: 0.2rem 0.6rem;
    font-size: 0.65rem;
    color: var(--text-mid);
    font-family: var(--mono);
  }

  /* Creative Angles */
  .creative-cards { display: flex; flex-direction: column; gap: 0.75rem; }

  .creative-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--blue);
    border-radius: 10px;
    padding: 1rem;
  }

  .creative-headline {
    font-weight: 800;
    font-size: 0.95rem;
    margin-bottom: 0.4rem;
    color: var(--text);
  }

  .creative-hook {
    font-size: 0.78rem;
    color: var(--text-mid);
    line-height: 1.5;
    margin-bottom: 0.75rem;
  }

  .creative-cta {
    display: inline-block;
    background: var(--blue);
    color: #fff;
    border-radius: 6px;
    padding: 0.35rem 0.85rem;
    font-size: 0.72rem;
    font-weight: 700;
  }

  /* ROI Estimate */
  .roi-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
  }

  .roi-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem;
    text-align: center;
  }

  .roi-value {
    font-family: var(--mono);
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }

  .roi-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .roi-positive { color: var(--green); }
  .roi-negative { color: var(--red); }
  .roi-neutral { color: var(--blue); }
  .roi-warn { color: var(--yellow); }

  /* Notes */
  .notes-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }

  .notes-list li {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 0.9rem;
    font-size: 0.78rem;
    color: var(--text-mid);
    line-height: 1.5;
    display: flex;
    gap: 0.6rem;
    align-items: flex-start;
  }

  .notes-list li::before {
    content: '▸';
    color: var(--blue);
    flex-shrink: 0;
    margin-top: 0.05em;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1.25rem;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text);
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(0,229,160,0.4); color: var(--green); }
  .toast.error { border-color: rgba(255,77,109,0.4); color: var(--red); }

  /* ── PANEL LOADING ── */
  .panel-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 1rem;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 0.75rem;
  }

  @media (max-width: 640px) {
    header { padding: 0 1rem; gap: 0.75rem; }
    .header-filters { display: none; }
    .stat-pill { display: none; }
    main { padding: 1rem; }
    .roi-grid { grid-template-columns: repeat(2, 1fr); }
    .audience-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-icon">⚡</div>
    <span class="logo-text">Sales<span>Bot</span></span>
  </a>

  <div class="header-filters">
    <input class="filter-input" id="filterCountry" type="text" placeholder="GEO (ex: BR, US, RU)" maxlength="10">
    <input class="filter-input" id="filterCategory" type="text" placeholder="Categoria (ex: Health, Beauty)">
    <button class="btn btn-ghost" onclick="loadOffers()">Filtrar</button>
  </div>

  <div class="header-actions">
    <div class="stat-pill" id="offerCount"><b>—</b> ofertas</div>
    <button class="btn btn-primary" id="syncBtn" onclick="syncOffers()">
      <span>↻</span> Sync Offers
    </button>
  </div>
</header>

<main>
  <div class="section-header">
    <span class="section-title">Top Offers</span>
    <div class="section-line"></div>
  </div>

  <div class="offers-grid" id="offersGrid">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Carregando ofertas...</p>
    </div>
  </div>
</main>

<!-- Panel Overlay -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>

<!-- Side Panel -->
<div class="side-panel" id="sidePanel">
  <div class="panel-header">
    <div class="panel-header-info">
      <div class="panel-offer-name" id="panelName">—</div>
      <div class="panel-meta" id="panelMeta"></div>
    </div>
    <div class="panel-payout" id="panelPayout">—</div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panelBody">
    <div class="panel-loading">
      <div class="spinner"></div>
      <span>Gerando setup...</span>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const TRAFFIC_ICONS = { social: '📱', native: '📰', search: '🔍', push: '🔔', default: '🚀' };

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

async function syncOffers() {
  const btn = document.getElementById('syncBtn');
  btn.classList.add('loading');
  btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;display:inline-block;"></span> Sincronizando...';
  try {
    const res = await fetch('/offers/sync', { method: 'POST' });
    if (!res.ok) throw new Error('Erro no sync');
    const data = await res.json();
    showToast(`✓ ${data.synced} ofertas sincronizadas`, 'success');
    loadOffers();
  } catch (e) {
    showToast('✗ Erro ao sincronizar: ' + e.message, 'error');
  } finally {
    btn.classList.remove('loading');
    btn.innerHTML = '<span>↻</span> Sync Offers';
  }
}

async function loadOffers() {
  const grid = document.getElementById('offersGrid');
  const country = document.getElementById('filterCountry').value.trim();
  const category = document.getElementById('filterCategory').value.trim();

  grid.innerHTML = '<div class="state-box"><div class="spinner"></div><p>Carregando ofertas...</p></div>';

  let url = '/offers/top?limit=50';
  if (country) url += '&country=' + encodeURIComponent(country);
  if (category) url += '&category=' + encodeURIComponent(category);

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('Falha ao buscar ofertas');
    const offers = await res.json();

    document.getElementById('offerCount').innerHTML = `<b>${offers.length}</b> ofertas`;

    if (!offers.length) {
      grid.innerHTML = `<div class="state-box"><div class="icon">🔍</div><p>Nenhuma oferta encontrada.</p><p class="hint">Clique em Sync Offers para importar ofertas do AdCombo.</p></div>`;
      return;
    }

    grid.innerHTML = offers.map((o, i) => `
      <div class="offer-card" style="animation-delay:${i * 0.04}s">
        <div class="card-top">
          <div class="offer-name">${escHtml(o.name)}</div>
          <div class="payout-badge">$${o.payout_amount?.toFixed(0) ?? '—'}</div>
        </div>
        <div class="card-meta">
          <span class="geo-tag">${escHtml(o.countries ?? '—')}</span>
          <span class="type-badge">${escHtml(o.type ?? '—')}</span>
          ${o.visibility === 'vip' ? '<span class="visibility-badge">VIP</span>' : ''}
        </div>
        <div class="categories">
          ${(o.categories || []).slice(0, 4).map(c => `<span class="cat-tag">${escHtml(c)}</span>`).join('')}
        </div>
        <div class="card-actions">
          <button class="btn-setup" onclick="openCampaignSetup(${o.id}, ${JSON.stringify(escHtml(o.name))}, ${o.payout_amount ?? 0}, ${JSON.stringify(escHtml(o.type ?? ''))}, ${JSON.stringify(escHtml(o.countries ?? ''))})">
            ⚡ Setup Campaign
          </button>
        </div>
      </div>
    `).join('');
  } catch (e) {
    grid.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p>${e.message}</p><p class="hint">Verifique se o serviço está rodando corretamente.</p></div>`;
  }
}

function openCampaignSetup(id, name, payout, type, geo) {
  document.getElementById('panelName').textContent = name;
  document.getElementById('panelPayout').textContent = '$' + payout.toFixed(0);
  document.getElementById('panelMeta').innerHTML = `
    <span class="geo-tag">${escHtml(geo)}</span>
    <span class="type-badge">${escHtml(type)}</span>
  `;
  document.getElementById('panelBody').innerHTML = `<div class="panel-loading"><div class="spinner"></div><span>Gerando setup de campanha...</span></div>`;
  document.getElementById('sidePanel').classList.add('open');
  document.getElementById('panelOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  fetchCampaignSetup(id);
}

function closePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  document.getElementById('panelOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

async function fetchCampaignSetup(offerId) {
  try {
    const res = await fetch(`/campaigns/setup/${offerId}`);
    if (!res.ok) throw new Error('Oferta não encontrada no banco. Faça o sync primeiro.');
    const d = await res.json();
    renderCampaignSetup(d);
  } catch (e) {
    document.getElementById('panelBody').innerHTML = `
      <div class="panel-loading">
        <div style="font-size:2rem">⚠️</div>
        <span>${e.message}</span>
      </div>`;
  }
}

function renderCampaignSetup(d) {
  const roi = d.roi_estimate;

  const trafficHtml = d.traffic_sources.map(ts => `
    <div class="traffic-card">
      <div class="traffic-icon">${TRAFFIC_ICONS[ts.type] ?? TRAFFIC_ICONS.default}</div>
      <div class="traffic-info">
        <div class="traffic-name">${escHtml(ts.name)}</div>
        <div class="traffic-why">${escHtml(ts.why)}</div>
      </div>
      <div class="traffic-cpc">
        <div class="cpc-value">$${ts.estimated_cpc.toFixed(2)}</div>
        <span class="cpc-label">est. CPC</span>
      </div>
    </div>
  `).join('');

  const audienceHtml = `
    <div class="audience-grid">
      <div class="audience-item">
        <div class="audience-label">Idade</div>
        <div class="audience-value">${escHtml(d.audience.age_range)}</div>
      </div>
      <div class="audience-item">
        <div class="audience-label">Gênero</div>
        <div class="audience-value">${escHtml(d.audience.gender)}</div>
      </div>
      <div class="audience-item" style="grid-column:1/-1">
        <div class="audience-label">Interesses</div>
        <div class="chips">${d.audience.interests.map(i => `<span class="chip">${escHtml(i)}</span>`).join('')}</div>
      </div>
      <div class="audience-item" style="grid-column:1/-1">
        <div class="audience-label">Dispositivos</div>
        <div class="chips">${d.audience.devices.map(i => `<span class="chip">${escHtml(i)}</span>`).join('')}</div>
      </div>
    </div>
  `;

  const creativesHtml = d.creative_angles.map((c, i) => `
    <div class="creative-card">
      <div class="creative-headline">${escHtml(c.headline)}</div>
      <div class="creative-hook">${escHtml(c.hook)}</div>
      <span class="creative-cta">${escHtml(c.cta)}</span>
    </div>
  `).join('');

  const profitClass = roi.estimated_daily_profit >= 0 ? 'roi-positive' : 'roi-negative';

  const roiHtml = `
    <div class="roi-grid">
      <div class="roi-card">
        <div class="roi-value roi-neutral">$${roi.suggested_daily_budget.toFixed(0)}</div>
        <div class="roi-label">Budget / dia</div>
      </div>
      <div class="roi-card">
        <div class="roi-value roi-neutral">${roi.estimated_daily_conversions.toFixed(1)}</div>
        <div class="roi-label">Conversões / dia</div>
      </div>
      <div class="roi-card">
        <div class="roi-value roi-positive">$${roi.estimated_daily_revenue.toFixed(0)}</div>
        <div class="roi-label">Receita / dia</div>
      </div>
      <div class="roi-card">
        <div class="roi-value roi-negative">-$${roi.estimated_daily_cost.toFixed(0)}</div>
        <div class="roi-label">Custo / dia</div>
      </div>
      <div class="roi-card">
        <div class="roi-value ${profitClass}">${roi.estimated_daily_profit >= 0 ? '+' : ''}$${roi.estimated_daily_profit.toFixed(0)}</div>
        <div class="roi-label">Lucro / dia</div>
      </div>
      <div class="roi-card">
        <div class="roi-value roi-warn">${(roi.breakeven_cr * 100).toFixed(2)}%</div>
        <div class="roi-label">CR Breakeven</div>
      </div>
    </div>
  `;

  const notesHtml = `<ul class="notes-list">${d.notes.map(n => `<li>${escHtml(n)}</li>`).join('')}</ul>`;

  const prelanderHtml = d.prelanding_recommended && d.prelanding_url ? `
    <div>
      <div class="panel-section-title">Pré-lander</div>
      <a href="${escHtml(d.prelanding_url)}" target="_blank" class="btn btn-ghost" style="font-size:0.75rem; text-decoration:none; display:inline-flex;">
        🔗 Abrir pré-lander
      </a>
    </div>
  ` : '';

  document.getElementById('panelBody').innerHTML = `
    <div>
      <div class="panel-section-title">Fontes de Tráfego</div>
      <div class="traffic-cards">${trafficHtml}</div>
    </div>
    <div>
      <div class="panel-section-title">Público-alvo</div>
      ${audienceHtml}
    </div>
    <div>
      <div class="panel-section-title">Ângulos de Criativos</div>
      <div class="creative-cards">${creativesHtml}</div>
    </div>
    <div>
      <div class="panel-section-title">Estimativa de ROI</div>
      ${roiHtml}
    </div>
    ${prelanderHtml}
    <div>
      <div class="panel-section-title">Notas Estratégicas</div>
      ${notesHtml}
    </div>
  `;
}

function escHtml(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('filterCountry').addEventListener('keydown', e => { if (e.key === 'Enter') loadOffers(); });
document.getElementById('filterCategory').addEventListener('keydown', e => { if (e.key === 'Enter') loadOffers(); });

loadOffers();
</script>
</body>
